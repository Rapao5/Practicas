version: '3.8'

services:
  # 🐬 1. Base de Datos MySQL
  db:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: biodiversidad_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # Esto evita que los datos se borren si se apaga el contenedor

  # ⚙️ 2. Backend en C# (.NET)
  backend:
    build:
      context: ./backend # Cambia esto a la ruta real de tu backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always
    environment:
      # Sobrescribimos la cadena de conexión para que el Server apunte al contenedor 'db' (no a localhost)
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=biodiversidad_db;User=root;Password=;

  # 🎨 3. Frontend en Vue 3 (Nginx)
  frontend:
    build:
      context: ./frontend # Cambia esto a la ruta real de tu frontend
    ports:
      - "80:80"

volumes:
  db_data: